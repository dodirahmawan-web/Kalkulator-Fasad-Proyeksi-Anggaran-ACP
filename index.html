<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Luas Fasad & Anggaran ACP</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">
    <script>
        // Data Dasar
        const baseAcpSpecs = {
            'seven-pe': { def: 620000 },
            'seven-pvdf': { def: 880000 },
            'seven-fr': { def: 1200000 },
            'marks-pe': { def: 560000 },
            'marks-pvdf': { def: 780000 },
            'jiyu-pe': { def: 520000 },
            'jiyu-pvdf': { def: 740000 }
        };

        const baseKomponen = {
            rangka: { def: 80000 },
            aksesoris: { def: 45000 },
            jasa: { def: 165000 }
        };

        const syncPairs = [
            { id: 'keliling' }, { id: 'tinggi' }, { id: 'jendela' }, 
            { id: 'lebar-jendela' }, { id: 'tinggi-jendela' },
            { id: 'harga-acp' }, { id: 'harga-rangka' }, 
            { id: 'harga-aksesoris' }, { id: 'harga-jasa' }, { id: 'eskalasi' }
        ];

        let isProgrammaticUpdate = false;

        function applyInflation(value) { return value; } // Placeholder inflasi

        function kalkulasiSemua() {
            console.log("Menjalankan kalkulasi...");
        }

        function initComponentLimits() {
            syncPairs.forEach(pair => {
                const rangeEl = document.getElementById(`input-${pair.id}`);
                const numEl = document.getElementById(`num-${pair.id}`);
                if (rangeEl && numEl) {
                    rangeEl.value = 0;
                    numEl.value = 0;
                }
            });
        }

        function updateSliderLimits(forceDefault = true) {
            console.log("Update limit slider");
        }

        function loadLastState() {
            const savedData = localStorage.getItem('acp_last_state');
            if (savedData) {
                try {
                    const state = JSON.parse(savedData);
                    isProgrammaticUpdate = true;
                    syncPairs.forEach(pair => {
                        if (state[pair.id] !== undefined) {
                            const numEl = document.getElementById(`num-${pair.id}`);
                            const rangeEl = document.getElementById(`input-${pair.id}`);
                            if(numEl && rangeEl) {
                                numEl.value = state[pair.id];
                                rangeEl.value = state[pair.id];
                            }
                        }
                    });
                    isProgrammaticUpdate = false;
                    kalkulasiSemua();
                    return true;
                } catch (e) {
                    console.error("Gagal parsing state", e);
                }
            }
            return false;
        }

        function renderHistory() {
            console.log("Render histori");
        }

        // Jalankan inisialisasi
        window.onload = () => {
            const hasSavedState = loadLastState();
            if (!hasSavedState) {
                initComponentLimits();
                updateSliderLimits();
                kalkulasiSemua();
            }
            renderHistory();
        };
    </script>
</body>
</html>
