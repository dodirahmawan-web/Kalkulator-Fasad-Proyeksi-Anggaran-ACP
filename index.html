<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Fasad ACP</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 text-slate-100 p-8">
    <div class="max-w-xl mx-auto bg-slate-800 p-6 rounded-xl shadow-lg">
        <h1 class="text-xl font-bold mb-6 text-white">Kalkulator Biaya ACP</h1>
        
        <div class="space-y-6">
            <div>
                <label class="block text-sm mb-2">Harga Jasa (/m²)</label>
                <input type="number" id="num-harga-jasa" class="w-full bg-slate-700 p-2 rounded border border-slate-600 text-white" value="0">
                <input type="range" id="input-harga-jasa" class="w-full mt-2 accent-blue-500" value="0" min="0" max="500000">
            </div>

            <div>
                <label class="block text-sm mb-2">Harga Rangka (/m²)</label>
                <input type="number" id="num-harga-rangka" class="w-full bg-slate-700 p-2 rounded border border-slate-600 text-white" value="0">
                <input type="range" id="input-harga-rangka" class="w-full mt-2 accent-blue-500" value="0" min="0" max="500000">
            </div>

            <div class="pt-4 border-t border-slate-700">
                <p class="text-lg font-semibold">Total: Rp <span id="display-total">0</span></p>
            </div>
        </div>
    </div>

    <script>
        const inputs = [
            { id: 'harga-jasa' },
            { id: 'harga-rangka' }
        ];

        function kalkulasi() {
            const jasa = parseFloat(document.getElementById('num-harga-jasa').value) || 0;
            const rangka = parseFloat(document.getElementById('num-harga-rangka').value) || 0;
            document.getElementById('display-total').innerText = (jasa + rangka).toLocaleString('id-ID');
        }

        inputs.forEach(item => {
            const num = document.getElementById(`num-${item.id}`);
            const range = document.getElementById(`input-${item.id}`);

            num.addEventListener('input', (e) => {
                range.value = e.target.value;
                kalkulasi();
            });

            range.addEventListener('input', (e) => {
                num.value = e.target.value;
                kalkulasi();
            });
        });
    </script>
</body>
</html>
